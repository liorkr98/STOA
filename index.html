<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E3A8A" />
    <link rel="manifest" href="/manifest.json" />

    <title>STOA — Verified Financial Research &amp; Analyst Track Records</title>
    <meta name="description" content="STOA — The platform for independent financial researchers. Publish research, lock predictions, build a verified track record." />
    <meta name="keywords" content="stock analysis, financial research, equity research, prediction track record, investment ideas, analyst ratings, AI market analyst, fact-checked reports" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <meta name="author" content="STOA" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="STOA" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="STOA — Verified Financial Research" />
    <meta property="og:description" content="Follow verified analysts with locked predictions and visible track records." />
    <meta property="og:image" content="https://stoamarket.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="STOA — Verified Financial Research" />
    <meta name="twitter:description" content="Follow verified analysts with locked predictions and visible track records." />
    <meta name="twitter:image" content="https://stoamarket.ai/og-image.png" />

    <!-- Performance: preconnect to the origins we actually hit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://s3.tradingview.com" crossorigin />
    <link rel="preconnect" href="https://query1.finance.yahoo.com" />
    <link rel="preconnect" href="https://query2.finance.yahoo.com" />
    <link rel="dns-prefetch" href="https://www.paypal.com" />

    <!-- Organization structured data — appears in Google Knowledge Panel -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "STOA",
      "url": "https://stoamarket.ai",
      "logo": "https://stoamarket.ai/og-image.png",
      "description": "Verified financial research platform with locked predictions and transparent analyst track records.",
      "sameAs": []
    }
    </script>

    <!-- WebSite structured data — enables Google sitelinks search box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "STOA",
      "url": "https://stoamarket.ai",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://stoamarket.ai/stocks?ticker={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script src="https://s3.tradingview.com/tv.js" defer></script>

    <!-- PayPal Hosted Buttons SDK -->
    <script 
      src="https://www.paypal.com/sdk/js?client-id=BAAO1UkKAcksce71UrcEzZEEY6G1LiJIK7EN9LnJDVg-FNsPq7dYgvALxb2v9is1cC8ZjVEc8SQyqqHb-E&components=hosted-buttons&disable-funding=venmo&currency=USD">
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
